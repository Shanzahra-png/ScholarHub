<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
</head>
<style>
    .container{
        background-color: blueviolet;
        height: 600px ;
    }
    /* .box{
        border-radius: 48px;
        height: 600px;
        margin: 30px;
        border: 1px solid ;
    }
    .box1{
        height: 300px;
        width: 900px;
        border: 1px;
    } */
</style>
<body>
    
    <div class="container">
      <div class="box">
        <fieldset>
         <div class="box1">
            <legend>Personal info</legend>
         
           <label for="fname">first name:</label>
           <input type="text" id="fname" name="fname">
           <label for="lname">Last name:</label>
           <input type="text" id="lname" name="lname"><br><br>
           <label for="age">age</label>
           <input type="number" id="age" name="age" min="0" max="100" step="1"><br><br>
           <label for="gender">gender:</label><br>
           <input type="radio" id="male" name="gender" value="male">
           <label for="male">Male</label>
           <input type="radio" id="female" name="gender" value="female">
           <label for="female">Female</label><br><br>
           <label for="dob">Date of Birth</label>
           <input type="date" id="dob" name="dob">
         </div>
        </fieldset>
        <fieldset>
            <legend>Contact info</legend>
            <label for="email">email:</label><br>
            <input type="chara" id="email" ><br><br>
            <label for="address">address:</label><br>
            <input type="text" id="address" ><br><br>
            <label for="phone no">phone no</label><br>
            <input type="number" id="phone no" ><br><br>

        </fieldset>
        <fieldset>
            <legend>Authentication</legend>
            <label for="password">Password:</label><br>
            <input type="password" id="password" ><br><br>
            <label for="cpassword">Confirm Password:</label><br>
            <input type="password" id="cpassword" ><br><br>

        </fieldset>
        <input type="submit" value="Submit">
    </div>
    </div>
</body>
</html>
